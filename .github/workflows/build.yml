name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: jieqin_game
  PYTHON_VERSION: '3.11'
  PROJECT_DIR: project/project
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Windows ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace
        run: ls -la

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles(format('{0}/requirements.txt', env.PROJECT_DIR), format('{0}/jieqin_game_windows.spec', env.PROJECT_DIR)) }}
          restore-keys: pip-win-

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pyinstaller PyQt6 tinycc

      - name: Build Windows App (onedir)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd ${{ env.PROJECT_DIR }}
          pyinstaller jieqin_game_windows.spec

      - name: Verify output
        run: |
          if (Test-Path "${{ env.PROJECT_DIR }}\dist\jieqin_game\jieqin_game.exe") {
              Write-Host "Build successful"
              Get-Item "${{ env.PROJECT_DIR }}\dist\jieqin_game\jieqin_game.exe" | Select-Object Name, Length
          } else {
              Write-Host "ERROR: exe not found"
              Get-ChildItem "${{ env.PROJECT_DIR }}\dist" -Recurse -File | Select-Object FullName
              exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: ${{ env.PROJECT_DIR }}/dist/jieqin_game/
          retention-days: 30

  # ── macOS x86_64 ──────────────────────────────────────────────────
  build-macos-x86:
    runs-on: macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace
        run: ls -la

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-13-${{ hashFiles(format('{0}/requirements.txt', env.PROJECT_DIR), format('{0}/jieqin_game_macos.spec', env.PROJECT_DIR)) }}
          restore-keys: pip-macos-13-

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pyinstaller PyQt6 tinycc

      - name: Build macOS App (onedir, x86_64)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd ${{ env.PROJECT_DIR }}
          pyinstaller jieqin_game_macos.spec

      - name: Verify output
        run: |
          if [ -d "${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app" ]; then
            echo "Build successful"
            ls -la "${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app"
            SIZE=$(du -sh "${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app" | cut -f1)
            echo "App size: $SIZE"
          else
            echo "ERROR: App not found"
            ls -la "${{ env.PROJECT_DIR }}/dist/"
            exit 1
          fi

      - name: Upload macOS x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-x86_64
          path: ${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app
          retention-days: 30

  # ── macOS arm64 ───────────────────────────────────────────────────
  build-macos-arm:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace
        run: ls -la

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-14-${{ hashFiles(format('{0}/requirements.txt', env.PROJECT_DIR), format('{0}/jieqin_game_macos.spec', env.PROJECT_DIR)) }}
          restore-keys: pip-macos-14-

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pyinstaller PyQt6 tinycc

      - name: Build macOS App (onedir, arm64)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd ${{ env.PROJECT_DIR }}
          pyinstaller jieqin_game_macos.spec

      - name: Verify output
        run: |
          if [ -d "${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app" ]; then
            echo "Build successful"
            ls -la "${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app"
            SIZE=$(du -sh "${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app" | cut -f1)
            echo "App size: $SIZE"
          else
            echo "ERROR: App not found"
            ls -la "${{ env.PROJECT_DIR }}/dist/"
            exit 1
          fi

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: ${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.app
          retention-days: 30

  # ── macOS Universal (Intel + Apple Silicon) ────────────────────────
  build-macos-universal:
    needs: [build-macos-x86, build-macos-arm]
    runs-on: macos-14
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Find artifacts
        run: |
          echo "Available artifacts:"
          find artifacts -type d -name "*.app" | head -20

      - name: Create universal binary
        run: |
          INTEL_APP=$(find artifacts -type d -name "${{ env.APP_NAME }}.app" | grep "macos-x86_64" | head -1)
          ARM_APP=$(find artifacts -type d -name "${{ env.APP_NAME }}.app" | grep "macos-arm64" | head -1)
          UNIVERSAL_APP="dist/${{ env.APP_NAME }}-universal.app"

          echo "Intel app: $INTEL_APP"
          echo "ARM app: $ARM_APP"

          if [ -n "$INTEL_APP" ] && [ -n "$ARM_APP" ]; then
            INTEL_BIN="$INTEL_APP/Contents/MacOS/${{ env.APP_NAME }}"
            ARM_BIN="$ARM_APP/Contents/MacOS/${{ env.APP_NAME }}"
            UNIVERSAL_BIN="dist/${{ env.APP_NAME }}-universal.app/Contents/MacOS/${{ env.APP_NAME }}"

            mkdir -p dist
            cp -r "$ARM_APP" "$UNIVERSAL_APP"

            if [ -f "$INTEL_BIN" ] && [ -f "$ARM_BIN" ]; then
              lipo -create "$INTEL_BIN" "$ARM_BIN" -output "$UNIVERSAL_BIN"
              echo "Created universal binary (Intel + ARM)"
              lipo -info "$UNIVERSAL_BIN"
            else
              echo "Binary files not found, copying ARM version"
            fi
          else
            echo "Cannot create universal binary (missing artifacts)"
            ls -la artifacts/
            exit 1
          fi

      - name: Verify universal app
        run: |
          if [ -d "dist/${{ env.APP_NAME }}-universal.app" ]; then
            echo "Universal app created"
            ls -la "dist/${{ env.APP_NAME }}-universal.app"
            lipo -info "dist/${{ env.APP_NAME }}-universal.app/Contents/MacOS/${{ env.APP_NAME }}"
          fi

      - name: Upload universal app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-universal
          path: dist/${{ env.APP_NAME }}-universal.app
          retention-days: 30

  # ── Release (on git tag) ──────────────────────────────────────────
  release:
    needs: [build-windows, build-macos-universal]
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release

          # Find and copy Windows
          WIN_DIR=$(find artifacts -type d -name "${{ env.APP_NAME }}" | grep windows | head -1)
          if [ -n "$WIN_DIR" ] && [ -d "$WIN_DIR" ]; then
            cp -r "$WIN_DIR" "release/${{ env.APP_NAME }}-windows/"
            cd release
            powershell -Command "Compress-Archive -Path '${{ env.APP_NAME }}-windows/*' -DestinationPath '${{ env.APP_NAME }}-windows.zip' -Force"
            echo "Windows zip created"
          fi

          # Find and copy macOS arm64
          ARM_APP=$(find artifacts -type d -name "${{ env.APP_NAME }}.app" | grep "macos-arm64" | head -1)
          if [ -n "$ARM_APP" ]; then
            cp -r "$ARM_APP" "release/${{ env.APP_NAME }}-macos-arm64.app"
            cd release
            zip -r "${{ env.APP_NAME }}-macos-arm64.zip" "${{ env.APP_NAME }}-macos-arm64.app"
            hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder "${{ env.APP_NAME }}-macos-arm64.app" -ov -format UDZO "${{ env.APP_NAME }}-macos-arm64.dmg"
            echo "macOS arm64 release created"
          fi

          # Find and copy macOS universal
          UNI_APP=$(find artifacts -type d -name "${{ env.APP_NAME }}-universal.app" | head -1)
          if [ -n "$UNI_APP" ]; then
            cp -r "$UNI_APP" "release/${{ env.APP_NAME }}-macos-universal.app"
            cd release
            zip -r "${{ env.APP_NAME }}-macos-universal.zip" "${{ env.APP_NAME }}-macos-universal.app"
            hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder "${{ env.APP_NAME }}-macos-universal.app" -ov -format UDZO "${{ env.APP_NAME }}-macos-universal.dmg"
            echo "macOS universal release created"
          fi

          echo "Release files:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
